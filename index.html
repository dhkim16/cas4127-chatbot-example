<html>
<head>
    <title>Chatbot Example</title>

    <!-- This is how you include css style files -->
    <link rel="stylesheet" type="text/css" href="css/index.css"/>

    <!-- This is how you include javascript files -->
    <script src="js/index.js"></script>
</head>
<body>
    <!-- Chat container -->
    <div id="chat-container">
        <!-- The message box where the chat messages will be displayed -->
        <div id="chat-messages"></div>

        <!-- User input field and send button -->
        <input type="text" id="user-input" placeholder="Type your message here..." />
        <button id="send-button" onclick="javascript:sendMessage()">Send</button>
    </div>
</body>
</html>
